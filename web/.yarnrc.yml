nodeLinker: node-modules

# The plugin uses Vue through @vue/devtools-core but omits Vue from its own
# peer metadata. Declaring it here lets Yarn correctly resolve the workspace's
# existing Vue 3 dependency without installing another copy.
packageExtensions:
  "vite-plugin-vue-devtools@*":
    peerDependencies:
      vue: "^3.0.0"
